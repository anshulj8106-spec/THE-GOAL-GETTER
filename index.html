<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Goal Getter</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;

    background: url("bg.jpg") no-repeat center center/cover;
    position: relative;
}

/* Dark overlay */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.6);
}

/* Card */
.card {
    position: relative;
    width: 340px;
    padding: 25px;
    border-radius: 20px;
    text-align: center;
    color: white;

    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 30px rgba(0,255,150,0.4);
}

/* Logo */
.logo {
    width: 170px;
    height: 170px;
    margin: auto;
    border-radius: 50%;
    background: url("https://images.unsplash.com/photo-1518091043644-c1d4457512c6") center/cover;
    margin-bottom: 15px;
}

/* Heading */
h1 {
    font-size: 22px;
    margin-bottom: 10px;
}

/* List */
ul {
    text-align: left;
    margin: 15px 0;
    padding-left: 20px;
}

ul li {
    margin: 8px 0;
}

/* Button */
.btn {
    display: block;
    margin-top: 15px;
    padding: 12px;
    border-radius: 8px;
    background: linear-gradient(45deg, #00c6ff, #0072ff);
    color: white;
    text-decoration: none;
    font-weight: bold;
}
</style>

</head>

<body>

<div class="card">

</body>
</html>
